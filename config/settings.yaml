# Rainier Trading Analysis Platform — Configuration

app:
  name: rainier
  data_dir: ./data
  log_level: INFO
  timezone: America/Los_Angeles

database:
  echo: false
  pool_size: 5

# --- Futures price action analysis ---

symbols:
  - NQ
  - ES
  - GC

timeframes:
  - 1D
  - 4H
  - 1H
  - 15m

analysis:
  pivot:
    lookback: 5
  sr_horizontal:
    cluster_atr_mult: 0.3
    min_touches: 2
    weight_touches: 0.4
    weight_recency: 0.3
    weight_volume: 0.2
    weight_round_number: 0.1
  sr_diagonal:
    min_swing_points: 2
    price_tolerance_atr_mult: 0.3
    min_touches: 2
  pin_bar:
    min_dominant_wick_ratio: 0.667
    max_secondary_wick_ratio: 0.333
    min_wick_body_ratio: 2.0
    min_amplitude_lookback: 20
    wick_exceed_lookback: 5
    sr_proximity_pct: 0.005
  max_sr_levels: 10

signal:
  scorer:
    min_confidence: 0.60
    weight_sr_strength: 0.30
    weight_wick_ratio: 0.20
    weight_volume_spike: 0.15
    weight_trend_alignment: 0.20
    weight_multi_tf_confluence: 0.15
  default_rr_target: 2.0
  min_rr_ratio: 1.5

risk:
  max_positions: 3
  max_daily_loss: 1000.0
  max_drawdown_pct: 0.05
  position_size_risk_pct: 0.01

alerts:
  discord:
    webhook_url: ""              # Set via DISCORD_WEBHOOK_URL in .env
    stock_webhook_url: ""        # Set via DISCORD_STOCK_WEBHOOK_URL in .env (falls back to webhook_url)
    enabled: true

# --- Stock scraping (QuantUnicorn) ---

scraping:
  quantunicorn:
    url: "https://www.quantunicorn.com/products#qu100"
    login_url: "https://www.quantunicorn.com/signin"
    session_file: "./data/auth/qu_session.json"
    session_ttl_hours: 12
    headless: true
    timeout_ms: 30000
  tradingview:
    base_url: "https://www.tradingview.com/chart/"
    timeframe_days: 120
    chart_width: 1280
    chart_height: 720
    headless: true
    output_dir: "./data/charts"
  schedule:
    morning: "08:35"
    midday: "10:35"
    afternoon: "12:35"
    close: "14:35"

# --- Stock screener (QU100 + 蔡森 patterns) ---

stock_screener:
  pattern_weights:
    false_breakdown: 1.0
    false_breakout: 1.0
    false_breakdown_w_bottom: 0.95
    w_bottom: 0.85
    m_top: 0.85
    hs_bottom: 0.80
    hs_top: 0.80
    bull_flag: 0.75
    bear_flag: 0.75
    false_breakout_hs: 0.75
    sym_triangle_bottom: 0.65
    sym_triangle_top: 0.65
  layer_weight_money_flow: 0.25
  layer_weight_sector: 0.10
  layer_weight_pattern: 0.65
  strong_buy_threshold: 0.80
  buy_threshold: 0.65
  watch_threshold: 0.50
  volume_breakout_multiplier: 1.5
  swing_lookback: 5
  neckline_tolerance_pct: 0.03
  min_pattern_bars: 10
  max_pattern_bars: 120
  stop_buffer_pct: 0.02
  min_daily_bars: 60

# --- IBKR data connection ---

ibkr:
  host: "127.0.0.1"
  port: 4001          # 7497=TWS paper, 7496=TWS live, 4002=Gateway paper, 4001=Gateway live
  client_id: 1
  timeout: 30
  readonly: true

# --- LLM analysis ---

llm:
  default_model: "claude-cli"
  fallback_models:
    - "openai/gpt-4o"
    - "gemini/gemini-2.0-flash"
  local_model: "ollama/deepseek-r1:14b"

# --- Notifications ---

notify:
  enabled: true
  subject_prefix: "[Rainier]"
